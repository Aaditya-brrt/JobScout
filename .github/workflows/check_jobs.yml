name: Check Runway Jobs

on:
  schedule:
    - cron: "*/5 * * * *"  # best-effort backup only - not relied on for timing
  workflow_dispatch: {}    # triggered externally via GitHub API for reliable timing

permissions:
  contents: write

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run job check
        env:
          RUNWAY_COOKIE: ${{ secrets.RUNWAY_COOKIE }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          MIN_MATCH_SCORE: "80"
        run: python check_jobs.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run.txt
          git add seen_ids.json last_run.txt
          git diff --quiet --cached || git commit -m "Update state [skip ci]"
          git push